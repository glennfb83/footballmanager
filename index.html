<!--
GLENN'S FOOTBALL MANAGER
UPDATED VERSION
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glenn's Football Manager</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:#0d1015;
    color:white;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:250px;
    background:#151922;
    border-right:1px solid #2a3140;
    padding:22px;
}

.logo{
    font-size:28px;
    font-weight:800;
    line-height:1.1;
    margin-bottom:8px;
}

.logo-sub{
    opacity:.65;
    font-size:13px;
    margin-bottom:25px;
}

.side-btn{
    width:100%;
    padding:13px;
    margin-bottom:10px;
    border:none;
    border-radius:12px;
    background:#202734;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:.2s;
}

.side-btn:hover{
    background:#2e384a;
}

.green{
    background:#1f7744;
}

.green:hover{
    background:#289455;
}

/* MAIN */

.main{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.topbar{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.stat{
    background:#171c26;
    border:1px solid #2c3545;
    padding:15px 20px;
    border-radius:14px;
    min-width:180px;
}

.stat-title{
    font-size:12px;
    opacity:.6;
}

.stat-value{
    font-size:22px;
    font-weight:700;
    margin-top:5px;
}

.card{
    background:#161b24;
    border:1px solid #2a3140;
    border-radius:16px;
    padding:22px;
    margin-bottom:20px;
}

.card h2{
    margin-bottom:10px;
}

.sub{
    opacity:.65;
    font-size:14px;
    margin-bottom:18px;
}

.instructions{
    background:#202734;
    border-left:4px solid #4da3ff;
    padding:14px;
    border-radius:10px;
    margin-bottom:18px;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:12px;
    background:#202734;
}

td{
    padding:12px;
    border-bottom:1px solid #252d3a;
}

tr:hover{
    background:#1f2632;
}

button{
    border:none;
    background:#2c3442;
    color:white;
    padding:9px 13px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#3a4557;
}

.red{
    background:#943636;
}

.red:hover{
    background:#b84b4b;
}

.pitch{
    width:100%;
    height:560px;
    background:#157132;
    border-radius:16px;
    border:4px solid white;
    position:relative;
    overflow:hidden;
    margin-top:20px;
}

.pitch::before{
    content:"";
    position:absolute;
    left:50%;
    width:3px;
    height:100%;
    background:white;
    transform:translateX(-50%);
}

.player{
    position:absolute;
    width:100px;
    height:40px;
    background:white;
    color:black;
    border-radius:50px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:12px;
    font-weight:700;
    transform:translate(-50%,-50%);
    cursor:grab;
}

/* NOTIFICATION */

.notification{
    position:fixed;
    top:20px;
    right:20px;
    background:#1e2531;
    border:1px solid #394355;
    padding:16px 20px;
    border-radius:14px;
    min-width:280px;
    z-index:999;
    opacity:0;
    transform:translateY(-20px);
    transition:.3s;
    pointer-events:none;
}

.notification.show{
    opacity:1;
    transform:translateY(0);
}

.notification-title{
    font-weight:700;
    margin-bottom:5px;
}

.notification-text{
    opacity:.75;
    font-size:14px;
}

input{
    background:#202734;
    border:1px solid #384255;
    color:white;
    padding:10px;
    border-radius:10px;
    width:260px;
    margin-right:10px;
}

.win{
    color:gold;
    font-size:28px;
    font-weight:800;
    margin-top:15px;
}

</style>
</head>
<body>

<div class="notification" id="notification">
    <div class="notification-title" id="notifyTitle"></div>
    <div class="notification-text" id="notifyText"></div>
</div>

<div class="container">

<div class="sidebar">

<div class="logo">Glenn's<br>Football Manager</div>
<div class="logo-sub">Simple Career Mode Experience</div>

<button class="side-btn" onclick="showScreen('dashboard')">Dashboard</button>
<button class="side-btn" onclick="showScreen('squad')">Squad</button>
<button class="side-btn" onclick="showScreen('transfers')">Transfers</button>
<button class="side-btn" onclick="showScreen('league')">League</button>
<button class="side-btn" onclick="showScreen('stats')">Stats</button>
<button class="side-btn" onclick="showScreen('club')">Club</button>

<hr style="margin:22px 0;border-color:#2d3645">

<button class="side-btn green" onclick="simNext()">Sim Match</button>
<button class="side-btn" onclick="simSeason()">Sim Season</button>

<hr style="margin:22px 0;border-color:#2d3645">

<button class="side-btn" onclick="saveGame()">Save Game</button>
<button class="side-btn" onclick="loadGame()">Load Save</button>
<button class="side-btn" onclick="newSeason()">New Season</button>

</div>

<div class="main" id="main"></div>

</div>

<script>

/* ---------------- NAMES ---------------- */

const firstNames = [
"Thiago","Luka","Enzo","Mason","Rafael","Joao","Nico","Kylian",
"Jude","Aurelien","Xavi","Pedri","Victor","Santiago","Dante",
"Emilio","Kaoru","Alejandro","Benjamin","Zaire","Yusuf","Leon"
];

const lastNames = [
"Silva","Costa","Walker","Mbappe","Bellingham","Garcia","Nakamura",
"Rossi","Fernandez","Muller","Adebayo","Santos","Kovacic",
"Torres","Reyes","Alvarez","Romero","Diallo","Kim","Mendes"
];

/* ---------------- HELPERS ---------------- */

function randomName(){
    return firstNames[Math.floor(Math.random()*firstNames.length)]
    + " " +
    lastNames[Math.floor(Math.random()*lastNames.length)];
}

function playerValue(ovr){
    return ovr * 1000000;
}

function createPlayer(){

    const ovr = Math.floor(Math.random()*25)+65;

    return{
        id:crypto.randomUUID(),
        name:randomName(),
        ovr,
        value:playerValue(ovr)
    };
}

/* ---------------- DATA ---------------- */

const formations = {

"4-3-3":[
[50,92],
[15,72],[38,72],[62,72],[85,72],
[28,48],[50,42],[72,48],
[20,20],[50,14],[80,20]
],

"4-4-2":[
[50,92],
[15,72],[38,72],[62,72],[85,72],
[15,48],[38,48],[62,48],[85,48],
[38,18],[62,18]
]

};

let leagueTeams = [];
let transferMarket = [];

let seasonNumber = 1;

let history = {
    seasonsPlayed:0,
    leagueTitles:0,
    totalWins:0,
    totalDraws:0,
    totalLosses:0
};

function buildLeague(){

leagueTeams = [];

for(let i=0;i<20;i++){

    let team = {
        name:i===0 ? userTeam?.name || "Your Club" : "FC " + (i+1),
        points:0,
        gf:0,
        ga:0,
        wins:0,
        draws:0,
        losses:0,
        players:[]
    };

    for(let p=0;p<18;p++){
        team.players.push(createPlayer());
    }

    leagueTeams.push(team);
}

}

buildLeague();

let userTeam = leagueTeams[0];

for(let i=0;i<40;i++){
    transferMarket.push(createPlayer());
}

let money = 80000000;
let matchday = 1;
let formation = "4-3-3";

let startingXI = [...userTeam.players]
.sort((a,b)=>b.ovr-a.ovr)
.slice(0,11);

/* ---------------- UI ---------------- */

function notify(title,text){

const box = document.getElementById("notification");

document.getElementById("notifyTitle").innerText = title;
document.getElementById("notifyText").innerText = text;

box.classList.add("show");

setTimeout(()=>{
    box.classList.remove("show");
},3000);

}

function avgRating(team){

return Math.round(
team.players.reduce((a,b)=>a+b.ovr,0)/team.players.length
);

}

function getTable(){

return [...leagueTeams].sort((a,b)=>{

if(b.points !== a.points){
return b.points-a.points;
}

return (b.gf-b.ga) - (a.gf-a.ga);

});

}

function autoBestXI(){

startingXI = [...userTeam.players]
.sort((a,b)=>b.ovr-a.ovr)
.slice(0,11);

showScreen("squad");

}

/* ---------------- SAVE ---------------- */

function saveGame(){

localStorage.setItem("gfm-save", JSON.stringify({
leagueTeams,
transferMarket,
money,
matchday,
formation,
startingXI,
seasonNumber,
history
}));

notify("Game Saved","Your career mode progress was saved.");

}

function loadGame(){

const save = JSON.parse(localStorage.getItem("gfm-save"));

if(!save){
notify("No Save Found","Start a new career first.");
return;
}

leagueTeams = save.leagueTeams;
transferMarket = save.transferMarket;
money = save.money;
matchday = save.matchday;
formation = save.formation;
startingXI = save.startingXI;
seasonNumber = save.seasonNumber;
history = save.history;

userTeam = leagueTeams[0];

notify("Save Loaded","Welcome back manager.");

showScreen("dashboard");

}

/* ---------------- SCREENS ---------------- */

function showScreen(screen){

const main = document.getElementById("main");

/* DASHBOARD */

if(screen==="dashboard"){

main.innerHTML = `

<div class="topbar">

<div class="stat">
<div class="stat-title">Club</div>
<div class="stat-value">${userTeam.name}</div>
</div>

<div class="stat">
<div class="stat-title">Money</div>
<div class="stat-value">$${money.toLocaleString()}</div>
</div>

<div class="stat">
<div class="stat-title">Season</div>
<div class="stat-value">${seasonNumber}</div>
</div>

<div class="stat">
<div class="stat-title">League Position</div>
<div class="stat-value">
${getTable().findIndex(t=>t.name===userTeam.name)+1}
</div>
</div>

</div>

<div class="card">

<h2>Manager Overview</h2>

<div class="instructions">
Sign players, build your best XI, and win the league title to dominate the save.
</div>

<p>
Your squad overall is <b>${avgRating(userTeam)}</b>.
</p>

${
getTable()[0].name===userTeam.name && matchday > 10
?
`<div class="win">🏆 You're leading the title race.</div>`
:
""
}

</div>

`;

}

/* SQUAD */

if(screen==="squad"){

let rows = "";

userTeam.players.forEach(p=>{

const inXI = startingXI.find(x=>x.id===p.id);

rows += `

<tr draggable="true"
ondragstart="dragPlayer('${p.id}')">

<td>${p.name}</td>
<td>${p.ovr}</td>
<td>$${p.value.toLocaleString()}</td>
<td>${inXI ? "Starting XI" : "Bench"}</td>

<td>
<button class="red"
onclick="sellPlayer('${p.id}')">
Sell
</button>
</td>

</tr>

`;

});

let pitchHTML = "";

const pos = formations[formation];

for(let i=0;i<11;i++){

const p = startingXI[i];

if(!p) continue;

pitchHTML += `

<div class="player"
style="left:${pos[i][0]}%; top:${pos[i][1]}%"
ondrop="dropPlayer(event, ${i})"
ondragover="allowDrop(event)">

${p.name.split(" ")[0]} (${p.ovr})

</div>

`;

}

main.innerHTML = `

<div class="card">

<h2>Starting XI</h2>

<div class="instructions">
Drag players from the table onto the pitch to replace players in your lineup.
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap">

<button onclick="formation='4-3-3';showScreen('squad')">
4-3-3
</button>

<button onclick="formation='4-4-2';showScreen('squad')">
4-4-2
</button>

<button class="green" onclick="autoBestXI()">
Highest OVR XI
</button>

</div>

<div class="pitch">
${pitchHTML}
</div>

</div>

<div class="card">

<h2>Squad List</h2>

<table>

<tr>
<th>Name</th>
<th>OVR</th>
<th>Value</th>
<th>Status</th>
<th></th>
</tr>

${rows}

</table>

</div>

`;

}

/* TRANSFERS */

if(screen==="transfers"){

let rows = "";

transferMarket.forEach((p,index)=>{

rows += `

<tr>

<td>${p.name}</td>
<td>${p.ovr}</td>
<td>$${p.value.toLocaleString()}</td>

<td>
<button class="green"
onclick="buyPlayer(${index})">
Buy
</button>
</td>

</tr>

`;

});

main.innerHTML = `

<div class="card">

<h2>Transfer Market</h2>

<div class="instructions">
Higher rated players cost more money but improve your title chances.
</div>

<table>

<tr>
<th>Name</th>
<th>OVR</th>
<th>Value</th>
<th></th>
</tr>

${rows}

</table>

</div>

`;

}

/* LEAGUE */

if(screen==="league"){

let rows = "";

getTable().forEach((t,i)=>{

rows += `

<tr>

<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.points}</td>
<td>${t.gf}</td>
<td>${t.ga}</td>

</tr>

`;

});

main.innerHTML = `

<div class="card">

<h2>League Table</h2>

<table>

<tr>
<th>Pos</th>
<th>Club</th>
<th>Pts</th>
<th>GF</th>
<th>GA</th>
</tr>

${rows}

</table>

</div>

`;

}

/* CLUB */

if(screen==="club"){

main.innerHTML = `

<div class="card">

<h2>Club Settings</h2>

<div class="sub">
Rename your club below.
</div>

<input id="clubName" value="${userTeam.name}">

<button class="green" onclick="renameClub()">
Save Name
</button>

</div>

`;

}

/* STATS */

if(screen==="stats"){

main.innerHTML = `

<div class="topbar">

<div class="stat">
<div class="stat-title">Seasons Played</div>
<div class="stat-value">${history.seasonsPlayed}</div>
</div>

<div class="stat">
<div class="stat-title">League Titles</div>
<div class="stat-value">${history.leagueTitles}</div>
</div>

<div class="stat">
<div class="stat-title">Wins</div>
<div class="stat-value">${history.totalWins}</div>
</div>

<div class="stat">
<div class="stat-title">Losses</div>
<div class="stat-value">${history.totalLosses}</div>
</div>

</div>

<div class="card">

<h2>Manager Legacy</h2>

<div class="instructions">
This page tracks your overall performance across every season.
</div>

<p><b>Draws:</b> ${history.totalDraws}</p>
<p><b>Current Club:</b> ${userTeam.name}</p>
<p><b>Current Season:</b> ${seasonNumber}</p>

</div>

`;

}

}

/* ---------------- CLUB ---------------- */

function renameClub(){

const val = document.getElementById("clubName").value.trim();

if(val.length < 2) return;

userTeam.name = val;

notify("Club Updated","Your club is now called " + val);

showScreen("club");

}

/* ---------------- TRANSFERS ---------------- */

function buyPlayer(index){

const p = transferMarket[index];

if(money < p.value){

notify("Transfer Failed","You don't have enough money.");

return;

}

money -= p.value;

userTeam.players.push(p);

transferMarket.splice(index,1);

notify("Player Signed",p.name + " joined your club.");

showScreen("transfers");

}

function sellPlayer(id){

const p = userTeam.players.find(x=>x.id===id);

money += p.value;

userTeam.players = userTeam.players.filter(x=>x.id!==id);

startingXI = startingXI.filter(x=>x.id!==id);

notify("Player Sold",p.name + " was sold.");

showScreen("squad");

}

/* ---------------- DRAG ---------------- */

let draggedPlayer = null;

function dragPlayer(id){
draggedPlayer = id;
}

function allowDrop(e){
e.preventDefault();
}

function dropPlayer(e,index){

e.preventDefault();

const player = userTeam.players.find(p=>p.id===draggedPlayer);

startingXI[index] = player;

showScreen("squad");

}

/* ---------------- MATCHES ---------------- */

function teamStrength(team){

if(team===userTeam){

return startingXI.reduce((a,b)=>a+b.ovr,0)/11;

}

return avgRating(team);

}

function simNext(){

if(matchday > 38){

notify("Season Finished","Start a new season.");

return;

}

for(let i=0;i<leagueTeams.length;i+=2){

const home = leagueTeams[i];
const away = leagueTeams[i+1];

const hs = teamStrength(home) + Math.random()*12;
const as = teamStrength(away) + Math.random()*12;

const hg = Math.floor((hs/30) * Math.random()*3);
const ag = Math.floor((as/30) * Math.random()*3);

home.gf += hg;
home.ga += ag;

away.gf += ag;
away.ga += hg;

if(home===userTeam || away===userTeam){

if(hg > ag){

if(home===userTeam) history.totalWins++;
else history.totalLosses++;

}

else if(ag > hg){

if(away===userTeam) history.totalWins++;
else history.totalLosses++;

}

else{

history.totalDraws++;

}

}

if(hg > ag){
home.points += 3;
home.wins++;
away.losses++;
}

else if(ag > hg){
away.points += 3;
away.wins++;
home.losses++;
}

else{
home.points++;
away.points++;
home.draws++;
away.draws++;
}

}

matchday++;

if(matchday > 38){

const winner = getTable()[0];

history.seasonsPlayed++;

if(winner.name===userTeam.name){

history.leagueTitles++;

notify(
"🏆 League Champions",
"You won the league title!"
);

}else{

notify(
"Season Finished",
winner.name + " won the league."
);

}

}

showScreen("dashboard");

}

function simSeason(){

while(matchday <= 38){
simNext();
}

}

/* ---------------- NEW SEASON ---------------- */

function newSeason(){

const currentName = userTeam.name;

seasonNumber++;

buildLeague();

userTeam = leagueTeams[0];

userTeam.name = currentName;

matchday = 1;

money = 80000000;

startingXI = [...userTeam.players]
.sort((a,b)=>b.ovr-a.ovr)
.slice(0,11);

transferMarket = [];

for(let i=0;i<40;i++){
transferMarket.push(createPlayer());
}

notify(
"New Season Started",
"Season " + seasonNumber + " is underway."
);

showScreen("dashboard");

}

/* ---------------- START ---------------- */

showScreen("dashboard");

</script>

</body>
</html>
