<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glenn's Football Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:
radial-gradient(circle at top left,#24446e 0%,transparent 30%),
radial-gradient(circle at bottom right,#166534 0%,transparent 30%),
#0b1016;
color:white;
overflow:hidden;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

.sidebar{
width:255px;
background:rgba(20,25,35,.95);
border-right:1px solid #334155;
padding:20px;
overflow-y:auto;
backdrop-filter:blur(10px);
}

.main{
flex:1;
overflow-y:auto;
padding:25px;
}

/* SIDEBAR */

.logo{
font-size:29px;
font-weight:900;
line-height:1.05;
margin-bottom:5px;
}

.logo-sub{
opacity:.65;
font-size:13px;
margin-bottom:25px;
}

.side-btn{
width:100%;
padding:13px;
margin-bottom:10px;
border:none;
border-radius:14px;
background:#202938;
color:white;
cursor:pointer;
font-size:15px;
transition:.2s;
}

.side-btn:hover{
background:#334155;
transform:translateY(-1px);
}

.green{
background:#1f8b4d !important;
}

.green:hover{
background:#28a35b !important;
}

.red{
background:#9c3a3a !important;
}

.red:hover{
background:#bb4a4a !important;
}

/* CARDS */

.card{
background:
linear-gradient(
145deg,
rgba(28,36,48,.96),
rgba(18,24,34,.96)
);

border:1px solid #3b4b68;

border-radius:20px;

padding:22px;

margin-bottom:22px;

box-shadow:
0 10px 25px rgba(0,0,0,.25);

backdrop-filter:blur(8px);
}

.card h2{
margin-bottom:10px;
}

.sub{
opacity:.7;
font-size:14px;
margin-bottom:18px;
}

/* TOPBAR */

.topbar{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:22px;
}

.stat{
background:
linear-gradient(
135deg,
rgba(42,56,78,.95),
rgba(26,34,48,.95)
);

border:1px solid #4b5d78;

border-radius:18px;

padding:16px 20px;

min-width:180px;

box-shadow:
0 8px 18px rgba(0,0,0,.2);
}

.stat-title{
font-size:12px;
opacity:.65;
}

.stat-value{
font-size:24px;
font-weight:800;
margin-top:5px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#222c3b;
padding:13px;
text-align:left;
}

td{
padding:13px;
border-bottom:1px solid #293241;
}

tr:hover{
background:#202938;
}

/* BUTTONS */

button{
border:none;
padding:9px 13px;
border-radius:10px;
background:#334155;
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#475569;
}

/* PITCH */

.pitch{
width:100%;
height:570px;
background:#17743a;
border:4px solid white;
border-radius:18px;
position:relative;
overflow:hidden;
margin-top:20px;
}

.pitch::before{
content:"";
position:absolute;
left:50%;
top:0;
width:3px;
height:100%;
background:white;
transform:translateX(-50%);
}

.player{
position:absolute;
width:105px;
height:40px;
background:white;
color:black;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:800;
transform:translate(-50%,-50%);
cursor:grab;
}

/* UI */

.instructions{
background:#1e293b;
border-left:4px solid #60a5fa;
padding:14px;
border-radius:12px;
margin-bottom:18px;
font-size:14px;
}

.notification{
position:fixed;
top:20px;
right:20px;
background:#1e293b;
border:1px solid #475569;
padding:16px 20px;
border-radius:16px;
min-width:290px;
z-index:999;
opacity:0;
transform:translateY(-20px);
transition:.3s;
pointer-events:none;
}

.notification.show{
opacity:1;
transform:translateY(0);
}

.notify-title{
font-weight:800;
margin-bottom:5px;
}

.notify-text{
opacity:.75;
font-size:14px;
}

input{
background:#1e293b;
border:1px solid #475569;
color:white;
padding:10px;
border-radius:12px;
width:250px;
}

.flex{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.win{
color:gold;
font-size:30px;
font-weight:900;
margin-top:15px;
}

.market-badge{
padding:5px 10px;
border-radius:999px;
font-weight:800;
color:black;
display:inline-block;
}

</style>
</head>
<body>

<div class="notification" id="notification">
<div class="notify-title" id="notifyTitle"></div>
<div class="notify-text" id="notifyText"></div>
</div>

<div class="container">

<div class="sidebar">

<div class="logo">Glenn's<br>Football Manager</div>
<div class="logo-sub">Simple Career Mode Experience</div>

<button class="side-btn" onclick="showScreen('dashboard')">Dashboard</button>
<button class="side-btn" onclick="showScreen('squad')">Squad</button>
<button class="side-btn" onclick="showScreen('transfers')">Transfer Market</button>
<button class="side-btn" onclick="showScreen('league')">League</button>
<button class="side-btn" onclick="showScreen('stats')">Stats</button>
<button class="side-btn" onclick="showScreen('club')">Club</button>

<hr style="margin:20px 0;border-color:#334155">

<button class="side-btn green" onclick="simNext()">Sim Match</button>
<button class="side-btn" onclick="simSeason()">Sim Season</button>

<hr style="margin:20px 0;border-color:#334155">

<button class="side-btn" onclick="saveGame()">Save Game</button>
<button class="side-btn" onclick="loadGame()">Load Save</button>
<button class="side-btn" onclick="newSeason()">New Season</button>

</div>

<div class="main" id="main"></div>

</div>

<script>

/* ---------------- DATA ---------------- */

const firstNames = [
"Thiago","Enzo","Kylian","Luka","Nico","Joao","Rafael","Pedri",
"Jude","Victor","Santiago","Kaoru","Alejandro","Zaire","Yusuf",
"Leon","Mason","Emilio","Dante","Aurelien","Xavi","Benjamin",
"Rayan","Theo","Mateo","Cristian","Tariq","Elias"
];

const lastNames = [
"Silva","Walker","Mbappe","Costa","Bellingham","Garcia","Nakamura",
"Rossi","Fernandez","Adebayo","Mendes","Kim","Diallo","Torres",
"Alvarez","Reyes","Romero","Santos","Kovacic","Muller",
"Moreira","Pereira","Ibrahim","Lopez","Costa","Sule"
];

let leagueTeams = [];
let transferMarket = [];

let money = 80000000;
let season = 1;
let matchday = 1;
let formation = "4-3-3";

let history = {
seasonsPlayed:0,
titles:0,
wins:0,
draws:0,
losses:0
};

const formations = {

"4-3-3":[
[50,92],
[15,72],[38,72],[62,72],[85,72],
[28,48],[50,42],[72,48],
[20,20],[50,14],[80,20]
],

"4-4-2":[
[50,92],
[15,72],[38,72],[62,72],[85,72],
[15,48],[38,48],[62,48],[85,48],
[38,18],[62,18]
]

};

function randomName(){

return firstNames[Math.floor(Math.random()*firstNames.length)]
+ " " +
lastNames[Math.floor(Math.random()*lastNames.length)];

}

function createPlayer(){

let ovr = Math.floor(Math.random()*25)+65;

if(Math.random() < .08){
ovr = Math.floor(Math.random()*8)+86;
}

return{
id:crypto.randomUUID(),
name:randomName(),
ovr,
value:ovr * 1000000
};

}

function createLeague(){

leagueTeams = [];

for(let i=0;i<20;i++){

const team = {
name:i===0 ? "Your Club" : "FC " + (i+1),
points:0,
gf:0,
ga:0,
wins:0,
draws:0,
losses:0,
players:[]
};

for(let p=0;p<18;p++){
team.players.push(createPlayer());
}

leagueTeams.push(team);

}

}

createLeague();

let userTeam = leagueTeams[0];

let startingXI = [...userTeam.players]
.sort((a,b)=>b.ovr-a.ovr)
.slice(0,11);

generateTransferMarket();

function generateTransferMarket(){

transferMarket = [];

for(let i=0;i<120;i++){
transferMarket.push(createPlayer());
}

}

/* ---------------- HELPERS ---------------- */

function notify(title,text){

const box = document.getElementById("notification");

document.getElementById("notifyTitle").innerText = title;
document.getElementById("notifyText").innerText = text;

box.classList.add("show");

setTimeout(()=>{
box.classList.remove("show");
},3000);

}

function avgRating(team){

return Math.round(
team.players.reduce((a,b)=>a+b.ovr,0)
/
team.players.length
);

}

function getTable(){

return [...leagueTeams].sort((a,b)=>{

if(b.points !== a.points){
return b.points-a.points;
}

return (b.gf-b.ga) - (a.gf-a.ga);

});

}

function autoBestXI(){

startingXI = [...userTeam.players]
.sort((a,b)=>b.ovr-a.ovr)
.slice(0,11);

showScreen("squad");

}

function refreshTransferMarket(){

generateTransferMarket();

notify(
"Market Refreshed",
"120 new players entered the market."
);

showScreen("transfers");

}

/* ---------------- SCREENS ---------------- */

function showScreen(screen){

const main = document.getElementById("main");

/* DASHBOARD */

if(screen==="dashboard"){

main.innerHTML = `

<div class="topbar">

<div class="stat">
<div class="stat-title">Club</div>
<div class="stat-value">${userTeam.name}</div>
</div>

<div class="stat">
<div class="stat-title">Money</div>
<div class="stat-value">$${money.toLocaleString()}</div>
</div>

<div class="stat">
<div class="stat-title">Season</div>
<div class="stat-value">${season}</div>
</div>

<div class="stat">
<div class="stat-title">League Position</div>
<div class="stat-value">
${getTable().findIndex(t=>t.name===userTeam.name)+1}
</div>
</div>

</div>

<div class="card">

<h2>Manager Overview</h2>

<div class="instructions">
Build your dream squad, sign stars, and win the league title.
</div>

<p><b>Squad Overall:</b> ${avgRating(userTeam)}</p>
<p><b>Matchday:</b> ${matchday}/38</p>

${
getTable()[0].name===userTeam.name && matchday > 5
?
`<div class="win">🏆 You're leading the title race.</div>`
:
""
}

</div>

`;

}

/* SQUAD */

if(screen==="squad"){

let rows = "";

userTeam.players.forEach(player=>{

const inXI = startingXI.find(p=>p.id===player.id);

rows += `

<tr draggable="true"
ondragstart="dragPlayer('${player.id}')">

<td>${player.name}</td>
<td>${player.ovr}</td>
<td>$${player.value.toLocaleString()}</td>
<td>${inXI ? "Starting XI" : "Bench"}</td>

<td>
<button class="red"
onclick="sellPlayer('${player.id}')">
Sell
</button>
</td>

</tr>

`;

});

let pitchHTML = "";

const pos = formations[formation];

for(let i=0;i<11;i++){

const player = startingXI[i];

if(!player) continue;

pitchHTML += `

<div class="player"
style="left:${pos[i][0]}%;top:${pos[i][1]}%"
ondrop="dropPlayer(event, ${i})"
ondragover="allowDrop(event)">

${player.name.split(" ")[0]} (${player.ovr})

</div>

`;

}

main.innerHTML = `

<div class="card">

<h2>Starting XI</h2>

<div class="instructions">
Drag players onto the pitch to replace your lineup.
</div>

<div class="flex">

<button onclick="formation='4-3-3';showScreen('squad')">
4-3-3
</button>

<button onclick="formation='4-4-2';showScreen('squad')">
4-4-2
</button>

<button class="green" onclick="autoBestXI()">
Highest OVR XI
</button>

</div>

<div class="pitch">
${pitchHTML}
</div>

</div>

<div class="card">

<h2>Squad List</h2>

<table>

<tr>
<th>Name</th>
<th>OVR</th>
<th>Value</th>
<th>Status</th>
<th></th>
</tr>

${rows}

</table>

</div>

`;

}

/* TRANSFERS */

if(screen==="transfers"){

let rows = "";

transferMarket
.sort((a,b)=>b.ovr-a.ovr)
.forEach((player,index)=>{

let color =
player.ovr >= 90 ? "#ffb703" :
player.ovr >= 85 ? "#8ecae6" :
player.ovr >= 80 ? "#90ee90" :
"#d9d9d9";

rows += `

<tr>

<td>${player.name}</td>

<td>
<span class="market-badge"
style="background:${color}">
${player.ovr}
</span>
</td>

<td>$${player.value.toLocaleString()}</td>

<td>

<button class="green"
onclick="buyPlayer(${index})">
Buy
</button>

</td>

</tr>

`;

});

main.innerHTML = `

<div class="card">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
">

<div>

<h2 style="margin-bottom:5px;">
Transfer Market
</h2>

<div class="sub">
120 players available with refreshed scouting lists.
</div>

</div>

<button class="green"
onclick="refreshTransferMarket()">
Refresh Market
</button>

</div>

<div class="instructions">
Elite players are color highlighted.
</div>

<div style="
max-height:650px;
overflow-y:auto;
border-radius:14px;
overflow:hidden;
">

<table>

<tr>
<th>Name</th>
<th>OVR</th>
<th>Value</th>
<th></th>
</tr>

${rows}

</table>

</div>

</div>

`;

}

/* LEAGUE */

if(screen==="league"){

let rows = "";

getTable().forEach((team,index)=>{

rows += `

<tr>

<td>${index+1}</td>
<td>${team.name}</td>
<td>${team.points}</td>
<td>${team.gf}</td>
<td>${team.ga}</td>

</tr>

`;

});

main.innerHTML = `

<div class="card">

<h2>League Table</h2>

<table>

<tr>
<th>Pos</th>
<th>Club</th>
<th>Pts</th>
<th>GF</th>
<th>GA</th>
</tr>

${rows}

</table>

</div>

`;

}

/* CLUB */

if(screen==="club"){

main.innerHTML = `

<div class="card">

<h2>Club Settings</h2>

<div class="sub">
Rename your club.
</div>

<div class="flex">

<input id="clubName"
value="${userTeam.name}">

<button class="green"
onclick="renameClub()">
Save Name
</button>

</div>

</div>

`;

}

/* STATS */

if(screen==="stats"){

main.innerHTML = `

<div class="topbar">

<div class="stat">
<div class="stat-title">Seasons Played</div>
<div class="stat-value">${history.seasonsPlayed}</div>
</div>

<div class="stat">
<div class="stat-title">League Titles</div>
<div class="stat-value">${history.titles}</div>
</div>

<div class="stat">
<div class="stat-title">Wins</div>
<div class="stat-value">${history.wins}</div>
</div>

<div class="stat">
<div class="stat-title">Losses</div>
<div class="stat-value">${history.losses}</div>
</div>

</div>

<div class="card">

<h2>Manager Legacy</h2>

<div class="instructions">
Your overall career performance across all seasons.
</div>

<p><b>Draws:</b> ${history.draws}</p>
<p><b>Current Club:</b> ${userTeam.name}</p>

</div>

`;

}

}

/* ---------------- CLUB ---------------- */

function renameClub(){

const name = document.getElementById("clubName").value.trim();

if(name.length < 2) return;

userTeam.name = name;

notify(
"Club Renamed",
"Your club is now " + name
);

showScreen("club");

}

/* ---------------- TRANSFERS ---------------- */

function buyPlayer(index){

const player = transferMarket[index];

if(money < player.value){

notify(
"Transfer Failed",
"Not enough money."
);

return;

}

money -= player.value;

userTeam.players.push(player);

transferMarket.splice(index,1);

notify(
"Player Signed",
player.name + " joined your club."
);

showScreen("transfers");

}

function sellPlayer(id){

const player = userTeam.players.find(p=>p.id===id);

if(!player) return;

money += player.value;

userTeam.players = userTeam.players.filter(p=>p.id!==id);

startingXI = startingXI.filter(p=>p.id!==id);

notify(
"Player Sold",
player.name + " was sold."
);

showScreen("squad");

}

/* ---------------- DRAG ---------------- */

let draggedPlayer = null;

function dragPlayer(id){
draggedPlayer = id;
}

function allowDrop(e){
e.preventDefault();
}

function dropPlayer(e,index){

e.preventDefault();

const player = userTeam.players.find(p=>p.id===draggedPlayer);

if(!player) return;

startingXI[index] = player;

showScreen("squad");

}

/* ---------------- MATCHES ---------------- */

function teamStrength(team){

if(team===userTeam){

return startingXI.reduce((a,b)=>a+b.ovr,0)/11;

}

return avgRating(team);

}

function simNext(){

if(matchday > 38){

notify(
"Season Finished",
"Start a new season."
);

return;

}

for(let i=0;i<leagueTeams.length;i+=2){

const home = leagueTeams[i];
const away = leagueTeams[i+1];

const hs = teamStrength(home) + Math.random()*10;
const as = teamStrength(away) + Math.random()*10;

const hg = Math.floor((hs/30) * Math.random()*3);
const ag = Math.floor((as/30) * Math.random()*3);

home.gf += hg;
home.ga += ag;

away.gf += ag;
away.ga += hg;

if(hg > ag){

home.points += 3;

if(home===userTeam) history.wins++;
if(away===userTeam) history.losses++;

}

else if(ag > hg){

away.points += 3;

if(away===userTeam) history.wins++;
if(home===userTeam) history.losses++;

}

else{

home.points++;
away.points++;

if(home===userTeam || away===userTeam){
history.draws++;
}

}

}

matchday++;

if(matchday > 38){

history.seasonsPlayed++;

const winner = getTable()[0];

if(winner.name===userTeam.name){

history.titles++;

notify(
"🏆 League Champions",
"You won the league title!"
);

}else{

notify(
"Season Finished",
winner.name + " won the league."
);

}

}

showScreen("dashboard");

}

function simSeason(){

while(matchday <= 38){
simNext();
}

}

/* ---------------- SAVE ---------------- */

function saveGame(){

localStorage.setItem("gfm-save",JSON.stringify({
leagueTeams,
transferMarket,
money,
season,
matchday,
formation,
history,
startingXI
}));

notify(
"Game Saved",
"Your progress has been saved."
);

}

function loadGame(){

const save = JSON.parse(localStorage.getItem("gfm-save"));

if(!save){

notify(
"No Save Found",
"Start a new save first."
);

return;

}

leagueTeams = save.leagueTeams;
transferMarket = save.transferMarket;
money = save.money;
season = save.season;
matchday = save.matchday;
formation = save.formation;
history = save.history;
startingXI = save.startingXI;

userTeam = leagueTeams[0];

notify(
"Save Loaded",
"Welcome back manager."
);

showScreen("dashboard");

}

/* ---------------- NEW SEASON ---------------- */

function newSeason(){

const clubName = userTeam.name;

season++;

createLeague();

userTeam = leagueTeams[0];
userTeam.name = clubName;

matchday = 1;
money = 80000000;
formation = "4-3-3";

startingXI = [...userTeam.players]
.sort((a,b)=>b.ovr-a.ovr)
.slice(0,11);

generateTransferMarket();

notify(
"New Season Started",
"Season " + season + " has begun."
);

showScreen("dashboard");

}

/* ---------------- START ---------------- */

showScreen("dashboard");

</script>
</body>
</html>
